<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meal Search App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/api-search.css">
</head>

<body>
	<h1>Meal Search</h1>
	<p>Search for meals by name and view details like category, origin, and image.</p>

	<div class="search-container">
		<input type="text" id="searchInput" placeholder="Enter a meal (chicken, taco, etc.)"/>
		<button id="searchBtn">Search</button>
	</div>

	<p id="status"></p>

	<div id="results"></div>

	<script src="js/api-search.js"></script>
</body>
</html>
